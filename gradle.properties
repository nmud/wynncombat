# Done to increase the memory available to gradle.
org.gradle.jvmargs=-Xmx1G
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Force Gradle to run on JDK 25 (required by Minecraft 26.1.2) instead of whatever JAVA_HOME points to.
org.gradle.java.home=C:/Program Files/Java/jdk-25

# Fabric Properties
# check these on https://fabricmc.net/develop
minecraft_version=26.1.2
loader_version=0.19.2
loom_version=1.16-SNAPSHOT

# Mod Properties
mod_version=1.0.0
maven_group=io.github.nmud
archives_base_name=wynncombat

# Dependencies
fabric_api_version=0.146.1+26.1.2